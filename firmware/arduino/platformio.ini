; copilot-buddy — PlatformIO build configuration
;
; Each [env:*] corresponds to a board preset in config.h.
; Build:  pio run -e devkit_st7789
; Flash:  pio run -e devkit_st7789 -t upload
; Serial: pio device monitor

[platformio]
src_dir   = copilot_buddy
default_envs = devkit_st7789

[env]
platform      = espressif32
framework     = arduino
monitor_speed = 115200
build_flags   =
    -std=gnu++17
    -Wall

; ─── ESP32-S3 DevKit + ST7789 240×240 (default) ─────────────────────────────
[env:devkit_st7789]
board = esp32-s3-devkitc-1
lib_deps =
    bblanchon/ArduinoJson@^7
    bodmer/TFT_eSPI@^2
build_flags =
    ${env.build_flags}
    -DBOARD_DEVKIT_ST7789
    ; TFT_eSPI driver config
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=10
    -DTFT_DC=9
    -DTFT_RST=8
    -DTFT_BL=7
    -DSPI_FREQUENCY=24000000
    -DTFT_RGB_ORDER=TFT_BGR

; ─── ESP32-S3 DevKit + ILI9341 240×320 ──────────────────────────────────────
[env:devkit_ili9341]
board = esp32-s3-devkitc-1
lib_deps =
