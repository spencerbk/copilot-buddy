; ─── ESP32-S3 DevKit + SSD1306 128×64 I2C OLED ──────────────────────────────
[env:devkit_ssd1306]
board = esp32-s3-devkitc-1
lib_deps =
    bblanchon/ArduinoJson@^7
    adafruit/Adafruit SSD1306@^2
    adafruit/Adafruit GFX Library@^1
build_flags =
    ${env.build_flags}
    -DBOARD_DEVKIT_SSD1306

